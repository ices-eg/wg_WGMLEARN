name: Check Markdown Links

on:
  push:
    branches: [ main, draft ]
  pull_request:
    branches: [ main, draft ]
#  schedule:
#    # Runs every Monday at 13:00 UTC to catch newly broken external URLs
#    - cron: "0 13 * * 1"

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run Markdown Link Checker
        uses: umbrelladocs/action-linkspector@v1
        with:
          github_token: ${{ secrets.github_token }}
          reporter: github-pr-review
          fail_level: any